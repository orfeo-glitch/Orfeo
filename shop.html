<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop — Orfeo</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #f0ede6;
    --dark:      #0d0d0d;
    --white:     #ffffff;
    --muted:     rgba(255, 255, 255, 0.5);
    --border:    rgba(13, 13, 13, 0.1);
    --panel:     #e8e5de;
    --nav-h:     52px;
    --font-sans: 'DM Sans', sans-serif;
  }

  html, body { height: 100%; overscroll-behavior: none; }

  body {
    background: var(--bg);
    color: var(--dark);
    font-family: var(--font-sans);
    overflow-x: hidden;
  }

  /* ── NAVBAR ── */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    height: var(--nav-h);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 36px;
    background: var(--bg);
    border-bottom: 0.5px solid rgba(13,13,13,0.12);
  }

  .nav-left { display: flex; align-items: center; gap: 20px; }

  .nav-link {
    font-family: var(--font-sans);
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--dark);
    text-decoration: none;
    opacity: 0.6;
    transition: opacity 0.2s ease;
  }
  .nav-link:hover { opacity: 1; }
  .nav-link.active { opacity: 1; }

  .nav-logo {
    font-family: var(--font-sans);
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.08em;
    color: var(--dark);
    text-decoration: none;
  }

  .nav-right { display: flex; align-items: center; gap: 24px; }

  .nav-search {
    display: flex;
    align-items: center;
    gap: 6px;
    border-bottom: 0.5px solid rgba(13,13,13,0.2);
    padding-bottom: 3px;
  }

  .nav-search input {
    background: transparent;
    border: none;
    outline: none;
    font-family: var(--font-sans);
    font-size: 11px;
    letter-spacing: 0.04em;
    color: var(--dark);
    width: 110px;
  }
  .nav-search input::placeholder { color: rgba(13,13,13,0.35); }

  .nav-cart {
    font-family: var(--font-sans);
    font-size: 11px;
    letter-spacing: 0.04em;
    color: var(--dark);
    cursor: pointer;
    opacity: 0.7;
  }

  /* ── SHOP HEADER ── */
  .shop-hero {
    margin-top: var(--nav-h);
    padding: 52px 40px 36px;
    border-bottom: 0.5px solid var(--border);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
  }

  .shop-hero-title {
    font-size: clamp(32px, 5vw, 56px);
    font-weight: 300;
    letter-spacing: -0.03em;
    line-height: 1;
    color: var(--dark);
  }

  .shop-hero-meta {
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 0.06em;
    color: rgba(13,13,13,0.4);
    text-align: right;
  }

  .products-count {
    font-size: 11px;
    font-family: var(--font-sans);
    font-weight: 300;
    letter-spacing: 0.06em;
    color: rgba(13,13,13,0.35);
  }

  /* ── FILTER BAR ── */
  .filter-bar {
    padding: 0 40px;
    display: flex;
    align-items: center;
    gap: 0;
    border-bottom: 0.5px solid var(--border);
    overflow-x: auto;
  }

  .filter-btn {
    font-family: var(--font-sans);
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: rgba(13,13,13,0.38);
    background: none;
    border: none;
    border-bottom: 1.5px solid transparent;
    padding: 14px 20px 12px;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s;
    white-space: nowrap;
  }
  .filter-btn:hover { color: var(--dark); }
  .filter-btn.active { color: var(--dark); border-bottom-color: var(--dark); }

  /* ── MAIN LAYOUT ── */
  .shop-body {
    display: flex;
    min-height: calc(100vh - var(--nav-h) - 120px);
  }

  /* ── GRID ── */
  .shop-main {
    flex: 1;
    padding: 36px 40px 80px;
  }

  .shop-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
  }

  .product-card {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .product-img {
    aspect-ratio: 3/4;
    background: var(--panel);
    overflow: hidden;
    position: relative;
  }

  .product-img img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    display: block;
    transition: transform 0.45s ease;
  }
  .product-card:hover .product-img img { transform: scale(1.03); }

  .product-badge {
    position: absolute;
    top: 12px;
    left: 12px;
    font-size: 9px;
    font-weight: 400;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    background: var(--dark);
    color: var(--white);
    padding: 3px 8px;
  }

  .product-badge.agotado {
    background: rgba(13,13,13,0.35);
  }

  .product-info { display: flex; flex-direction: column; gap: 4px; }

  .product-name {
    font-family: var(--font-sans);
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 0.02em;
    color: var(--dark);
  }

  .product-cat {
    font-family: var(--font-sans);
    font-size: 10px;
    font-weight: 300;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: rgba(13,13,13,0.38);
  }

  .product-price {
    font-family: var(--font-sans);
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 0.02em;
    color: var(--dark);
    margin-top: 2px;
  }

  .product-add {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 4px;
    padding: 8px 16px;
    border: 0.5px solid rgba(13,13,13,0.2);
    border-radius: 999px;
    background: transparent;
    color: var(--dark);
    font-family: var(--font-sans);
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    width: fit-content;
    transition: background 0.2s, border-color 0.2s, color 0.2s;
  }
  .product-add:hover,
  .product-add.added { background: var(--dark); color: var(--white); border-color: var(--dark); }

  /* ── EMPTY STATE ── */
  .empty-state {
    grid-column: 1/-1;
    text-align: center;
    padding: 80px 20px;
    font-size: 13px;
    font-weight: 300;
    color: rgba(13,13,13,0.4);
  }

  /* ── FOOTER (mismo que index) ── */
  footer {
    background: var(--dark);
    border-top: 0.5px solid rgba(255,255,255,0.08);
    padding: 60px 40px 32px;
  }

  .footer-index {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 40px;
    margin-bottom: 52px;
  }

  .footer-col-title {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
    margin-bottom: 16px;
  }

  .footer-col-links { display: flex; flex-direction: column; gap: 10px; }

  .footer-col-link {
    font-size: 12px;
    font-weight: 300;
    color: rgba(255,255,255,0.5);
    text-decoration: none;
    letter-spacing: 0.02em;
    transition: color 0.2s ease;
  }
  .footer-col-link:hover { color: var(--white); }

  .footer-bottom {
    border-top: 0.5px solid rgba(255,255,255,0.06);
    padding-top: 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .footer-copy {
    font-size: 11px;
    font-weight: 300;
    color: rgba(255,255,255,0.2);
    letter-spacing: 0.03em;
  }

  .footer-logo {
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.08em;
    color: rgba(255,255,255,0.2);
    text-transform: uppercase;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 900px) {
    .shop-grid { grid-template-columns: repeat(2, 1fr); }
    .shop-hero { padding: 40px 24px 28px; flex-direction: column; align-items: flex-start; gap: 12px; }
    .filter-bar { padding: 0 24px; }
    .shop-main { padding: 28px 24px 60px; }
  }

  @media (max-width: 600px) {
    nav { padding: 0 20px; }
    .nav-search { display: none; }
    .footer-index { grid-template-columns: repeat(2, 1fr); gap: 28px; }
    footer { padding: 48px 20px 24px; }
  }
  /* ── PRODUCT DETAIL MODAL ── */
  #detail-overlay {
    position: fixed; inset: 0;
    z-index: 200;
    background: rgba(13,13,13,0.55);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    backdrop-filter: blur(4px);
  }
  #detail-overlay.active { display: flex; }

  #detail-modal {
    background: var(--bg);
    width: 100%; max-width: 900px;
    max-height: 92vh;
    display: grid;
    grid-template-columns: 1fr 1fr;
    overflow: hidden;
    position: relative;
    animation: detailIn 0.2s cubic-bezier(0.34,1.46,0.64,1);
  }
  @keyframes detailIn {
    from { opacity:0; transform: scale(0.96) translateY(6px); }
    to   { opacity:1; transform: scale(1) translateY(0); }
  }

  #detail-close {
    position: absolute; top: 14px; right: 14px; z-index: 10;
    width: 28px; height: 28px; border-radius: 50%;
    background: rgba(240,237,230,0.9); border: none;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  #detail-close:hover { background: var(--bg); }

  /* — carousel — */
  #detail-carousel {
    position: relative;
    background: var(--panel);
    overflow: hidden;
    min-height: 400px;
  }
  .detail-slide {
    position: absolute; inset: 0;
    opacity: 0; transition: opacity 0.28s ease;
  }
  .detail-slide.active { opacity: 1; }
  .detail-slide img {
    width: 100%; height: 100%;
    object-fit: cover; display: block;
  }
  .detail-slide.no-img {
    display: flex; align-items: center; justify-content: center;
    background: var(--panel);
  }

  .c-nav-btn {
    position: absolute; top: 50%; transform: translateY(-50%);
    width: 30px; height: 30px; border-radius: 50%;
    background: rgba(240,237,230,0.85); border: none;
    cursor: pointer; z-index: 5;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .c-nav-btn:hover { background: var(--bg); }
  .c-nav-btn.hidden { display: none; }
  #c-prev { left: 10px; }
  #c-next { right: 10px; }

  .c-dots {
    position: absolute; bottom: 10px; left: 0; right: 0;
    display: flex; justify-content: center; gap: 5px; z-index: 5;
  }
  .c-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: rgba(13,13,13,0.22); cursor: pointer;
    transition: background 0.15s;
  }
  .c-dot.on { background: var(--dark); }

  /* — info panel — */
  #detail-info {
    padding: 32px 28px 28px;
    overflow-y: auto;
    display: flex; flex-direction: column; gap: 0;
  }

  .d-cat {
    font-size: 10px; font-weight: 400; letter-spacing: 0.1em;
    text-transform: uppercase; color: rgba(13,13,13,0.38);
    margin-bottom: 8px;
  }
  .d-nombre {
    font-size: clamp(18px, 2.5vw, 24px); font-weight: 300;
    letter-spacing: -0.02em; line-height: 1.15;
    margin-bottom: 6px; color: var(--dark);
  }
  .d-precio {
    font-size: 15px; font-weight: 300; color: var(--dark);
    margin-bottom: 20px;
  }
  .d-divider { height: 0.5px; background: rgba(13,13,13,0.1); margin: 14px 0; }
  .d-section-lbl {
    font-size: 10px; font-weight: 400; letter-spacing: 0.09em;
    text-transform: uppercase; color: rgba(13,13,13,0.4);
    margin-bottom: 10px;
  }

  /* colors */
  .d-color-row { display: flex; flex-wrap: wrap; gap: 8px; }
  .d-color-item { display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .d-swatch {
    width: 26px; height: 26px; border-radius: 50%;
    cursor: pointer; border: 2px solid transparent;
    transition: border-color 0.15s, transform 0.12s;
  }
  .d-swatch:hover { transform: scale(1.1); }
  .d-swatch.on { border-color: var(--dark); }
  .d-swatch-name {
    font-size: 9px; letter-spacing: 0.04em;
    color: rgba(13,13,13,0.45); max-width: 36px;
    text-align: center; overflow: hidden;
    white-space: nowrap; text-overflow: ellipsis;
  }

  /* sizes */
  .d-size-row { display: flex; flex-wrap: wrap; gap: 5px; }
  .d-size-btn {
    padding: 6px 12px;
    border: 0.5px solid rgba(13,13,13,0.18);
    background: transparent;
    font-family: var(--font-sans);
    font-size: 11px; color: var(--dark);
    cursor: pointer; border-radius: 2px;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
  }
  .d-size-btn:hover { border-color: rgba(13,13,13,0.35); }
  .d-size-btn.on { background: var(--dark); color: white; border-color: var(--dark); }

  /* desc / material */
  .d-desc-text {
    font-size: 12px; font-weight: 300; line-height: 1.75;
    color: rgba(13,13,13,0.68);
  }
  .d-mat-toggle {
    font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase;
    color: rgba(13,13,13,0.4); background: none; border: none;
    font-family: var(--font-sans); cursor: pointer;
    text-decoration: underline; padding: 0;
  }
  .d-mat-body {
    font-size: 11px; font-weight: 300; line-height: 1.65;
    color: rgba(13,13,13,0.55); margin-top: 8px; display: none;
  }
  .d-mat-body.open { display: block; }

  /* size guide */
  .d-guide-toggle {
    font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase;
    color: rgba(13,13,13,0.4); background: none; border: none;
    font-family: var(--font-sans); cursor: pointer;
    text-decoration: underline; padding: 0; display: block; margin-top: 8px;
  }
  .d-guide-body {
    margin-top: 10px; display: none;
    border: 0.5px solid rgba(13,13,13,0.1);
    font-size: 11px; font-weight: 300;
    line-height: 1.6; color: rgba(13,13,13,0.6);
    white-space: pre-wrap; padding: 10px 12px;
    background: rgba(13,13,13,0.02);
  }
  .d-guide-body.open { display: block; }

  /* add to cart */
  .d-add-row {
    margin-top: auto; padding-top: 20px;
  }
  .d-add-btn {
    width: 100%; padding: 13px 24px;
    background: var(--dark); color: white; border: none;
    font-family: var(--font-sans); font-size: 11px; font-weight: 400;
    letter-spacing: 0.08em; text-transform: uppercase;
    cursor: pointer; border-radius: 999px;
    transition: background 0.2s;
  }
  .d-add-btn:hover { background: rgba(13,13,13,0.82); }
  .d-add-btn:disabled { background: rgba(13,13,13,0.18); cursor: not-allowed; }
  .d-add-btn.added { background: rgba(13,13,13,0.6); }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25%      { transform: translateX(-4px); }
    75%      { transform: translateX(4px); }
  }

  /* responsive modal */
  @media (max-width: 700px) {
    #detail-modal {
      grid-template-columns: 1fr;
      grid-template-rows: 55vw 1fr;
      max-height: 95vh;
    }
    #detail-carousel { min-height: unset; }
  }
</style>
</head>
<body>

<!-- ── NAVBAR ── -->
<nav id="navbar">
  <div class="nav-left">
    <a href="index.html" class="nav-logo">Orfeo</a>
    <a href="index.html" class="nav-link">Inicio</a>
    <a href="shop.html" class="nav-link active">Shop</a>
  </div>
  <div class="nav-right">
    <div class="nav-search">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="opacity:0.5">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" placeholder="Buscar" id="search-input" oninput="filterProducts()">
    </div>
    <span class="nav-cart"><a href="cart.html" id="nav-cart" style="color:inherit;text-decoration:none;">Carrito: 0</a></span>
  </div>
</nav>

<!-- ── SHOP HEADER ── -->
<div class="shop-hero">
  <h1 class="shop-hero-title">Colección</h1>
  <div class="shop-hero-meta">
    <p class="products-count" id="products-count">—</p>
    <p style="margin-top:4px;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:rgba(13,13,13,0.28);">SS2026</p>
  </div>
</div>

<!-- ── FILTER BAR ── -->
<div class="filter-bar">
  <button class="filter-btn active" data-filter="all" onclick="setFilter('all', this)">Todo</button>
  <button class="filter-btn" data-filter="sweater" onclick="setFilter('sweater', this)">Sweaters</button>
  <button class="filter-btn" data-filter="accesorio" onclick="setFilter('accesorio', this)">Accesorios</button>
</div>

<!-- ── SHOP BODY ── -->
<div class="shop-body">
  <main class="shop-main">
    <div class="shop-grid" id="shop-grid">
      <!-- products rendered by JS -->
    </div>
  </main>
</div>

<!-- ── FOOTER ── -->
<footer>
  <div class="footer-index">
    <div>
      <p class="footer-col-title">Shop</p>
      <div class="footer-col-links">
        <a href="shop.html" class="footer-col-link">Todo</a>
        <a href="shop.html?filter=sweater" class="footer-col-link">Sweaters</a>
        <a href="shop.html?filter=accesorio" class="footer-col-link">Accesorios</a>
      </div>
    </div>
    <div>
      <p class="footer-col-title">Info</p>
      <div class="footer-col-links">
        <a href="#" class="footer-col-link">Sobre Orfeo</a>
        <a href="#" class="footer-col-link">Envíos</a>
        <a href="#" class="footer-col-link">Cambios y devoluciones</a>
        <a href="#" class="footer-col-link">Términos</a>
      </div>
    </div>
    <div>
      <p class="footer-col-title">Socials</p>
      <div class="footer-col-links">
        <a href="#" class="footer-col-link" id="lnk-ig">Instagram</a>
        <a href="#" class="footer-col-link" id="lnk-tk">TikTok</a>
        <a href="#" class="footer-col-link">Pinterest</a>
      </div>
    </div>
    <div>
      <p class="footer-col-title">Contacto</p>
      <div class="footer-col-links">
        <a href="index.html#contact" class="footer-col-link">Formulario</a>
        <a href="mailto:hola@orfeo.ar" class="footer-col-link" id="lnk-email">hola@orfeo.ar</a>
        <a href="#" class="footer-col-link" id="lnk-wa">WhatsApp</a>
      </div>
    </div>
  </div>
  <div class="footer-bottom">
    <span class="footer-copy">© 2026 Orfeo. Todos los derechos reservados.</span>
    <span class="footer-logo">Orfeo®</span>
  </div>
</footer>

<script>
/* ── DATA ── */
const DB_KEY = 'orfeo_db';

const fallbackProducts = [
  { id:1, nombre:"Sweater Rayado Marron", precio:30000, img:"product-1.png", categoria:"sweater", stock:true, destacado:true, descripcion:"" },
  { id:2, nombre:"Sweater Azul Splash",   precio:40000, img:"product-2.png", categoria:"sweater", stock:true, destacado:true, descripcion:"" },
  { id:3, nombre:"Sweater Double Azul",   precio:25000, img:"product-3.png", categoria:"sweater", stock:true, destacado:true, descripcion:"" },
  { id:4, nombre:"Sweater Rayado Azul",   precio:30000, img:"product-4.png", categoria:"sweater", stock:true, destacado:true, descripcion:"" },
];

let allProducts = [];
let currentFilter = 'all';

async function loadProducts() {
  let db = null;

  // 1. Intentar API
  try {
    const res = await fetch('/api/entries');
    if (res.ok) db = await res.json();
  } catch(e) {}

  // 2. Fallback: localStorage
  if (!db) {
    try { db = JSON.parse(localStorage.getItem(DB_KEY) || 'null'); } catch(e) {}
  }

  allProducts = (db && db.products && db.products.length > 0) ? db.products : fallbackProducts;

  if (db && db.settings) {
    const s = db.settings;
    if (s.email)    { const el = document.getElementById('lnk-email'); el.href = 'mailto:'+s.email; el.textContent = s.email; }
    if (s.instagram && s.instagram !== '#') document.getElementById('lnk-ig').href = s.instagram;
    if (s.tiktok    && s.tiktok !== '#')    document.getElementById('lnk-tk').href = s.tiktok;
    if (s.whatsapp  && s.whatsapp !== '#')  document.getElementById('lnk-wa').href = 'https://wa.me/' + s.whatsapp.replace(/\D/g,'');
  }
}

/* ── FILTER ── */
function setFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (productsLoaded) renderProducts();
}

function filterProducts() {
  renderProducts();
}

function getFiltered() {
  const search = (document.getElementById('search-input').value || '').toLowerCase().trim();
  return allProducts.filter(p => {
    const matchCat = currentFilter === 'all' || p.categoria === currentFilter;
    const matchSearch = !search || p.nombre.toLowerCase().includes(search) || (p.descripcion || '').toLowerCase().includes(search);
    return matchCat && matchSearch;
  });
}

/* ── RENDER ── */
function renderProducts() {
  const filtered = getFiltered();
  const grid = document.getElementById('shop-grid');
  const count = document.getElementById('products-count');

  count.textContent = filtered.length + (filtered.length === 1 ? ' producto' : ' productos');

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty-state">No se encontraron productos.</div>';
    return;
  }

  grid.innerHTML = filtered.map(p => `
    <div class="product-card" onclick='openDetail(${JSON.stringify(p).replace(/'/g,"&#39;")})' style="cursor:pointer">
      <div class="product-img">
        <img src="${escHtml(p.img)}" alt="${escHtml(p.nombre)}" onerror="this.style.display='none'">
        ${!p.stock ? '<span class="product-badge agotado">Agotado</span>' : ''}
      </div>
      <div class="product-info">
        <span class="product-cat">${escHtml(p.categoria)}</span>
        <span class="product-name">${escHtml(p.nombre)}</span>
        <span class="product-price">$${Number(p.precio).toLocaleString('es-AR')}</span>
        ${p.stock !== false ? `<button class="product-add" onclick='event.stopPropagation();handleAdd(this,${JSON.stringify(p).replace(/'/g,"&#39;")})'>+ Agregar</button>` : ''}
      </div>
    </div>
  `).join('');
}

function escHtml(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ── CARRITO ── */
const CART_KEY = 'orfeo_cart';

function getCart() {
  try { return JSON.parse(localStorage.getItem(CART_KEY) || '[]'); } catch { return []; }
}

function saveCart(cart) {
  localStorage.setItem(CART_KEY, JSON.stringify(cart));
  updateCartNav();
}

function updateCartNav() {
  const cart = getCart();
  const total = cart.reduce((sum, i) => sum + i.qty, 0);
  const el = document.getElementById('nav-cart');
  if (el) el.textContent = `Carrito: ${total}`;
}

function handleAdd(btn, product) {
  const cart = getCart();
  const existing = cart.find(i => i.id === product.id);
  if (existing) existing.qty += 1;
  else cart.push({ ...product, qty: 1 });
  saveCart(cart);
  btn.textContent = '✓ Agregado';
  btn.classList.add('added');
  setTimeout(() => { btn.textContent = '+ Agregar'; btn.classList.remove('added'); }, 1800);
}

updateCartNav();

updateCartNav();

/* ── PRODUCT DETAIL MODAL ── */
let _dp = null, _ci = 0, _sc = null, _st = null;

function openDetail(p) {
  _dp = p; _ci = 0; _sc = null; _st = null;
  const imgs = (p.imgs && p.imgs.length > 0) ? p.imgs : (p.img ? [p.img] : []);

  document.getElementById('detail-slides').innerHTML = imgs.map((src, i) => `
    <div class="detail-slide ${i===0?'active':''}">
      <img src="${escHtml(src)}" alt="${escHtml(p.nombre)}" onerror="this.style.display='none'">
    </div>
  `).join('');

  document.getElementById('c-dots').innerHTML = imgs.length > 1
    ? imgs.map((_,i) => `<div class="c-dot ${i===0?'on':''}" onclick="carouselGo(${i})"></div>`).join('') : '';
  document.getElementById('c-prev').classList.toggle('hidden', imgs.length <= 1);
  document.getElementById('c-next').classList.toggle('hidden', imgs.length <= 1);

  document.getElementById('d-cat').textContent    = p.categoria || '';
  document.getElementById('d-nombre').textContent = p.nombre    || '';
  document.getElementById('d-precio').textContent = '$' + Number(p.precio).toLocaleString('es-AR');

  // Colors
  const colors = p.colores || [];
  const cW = document.getElementById('d-colors-wrap');
  if (colors.length > 0) {
    cW.style.display = '';
    document.getElementById('d-colors').innerHTML = colors.map((c,i) => `
      <div class="d-color-item">
        <div class="d-swatch" style="background:${escHtml(c.hex||'#ccc')}"
          onclick="detailSelectColor(${i})" title="${escHtml(c.nombre||'')}"></div>
        <span class="d-swatch-name">${escHtml(c.nombre||'')}</span>
      </div>`).join('');
  } else cW.style.display = 'none';

  // Sizes
  const sizes = p.talles || [];
  const sW = document.getElementById('d-sizes-wrap');
  if (sizes.length > 0) {
    sW.style.display = '';
    document.getElementById('d-sizes').innerHTML = sizes.map((t,i) => `
      <button class="d-size-btn" onclick="detailSelectSize(${i},${JSON.stringify(t)})">${escHtml(t)}</button>`).join('');
  } else sW.style.display = 'none';

  // Desc
  const dW = document.getElementById('d-desc-wrap');
  if (p.descripcion) { dW.style.display = ''; document.getElementById('d-desc').textContent = p.descripcion; }
  else dW.style.display = 'none';

  // Material
  const mW = document.getElementById('d-mat-wrap');
  if (p.materialInfo) { mW.style.display = ''; const mb = document.getElementById('d-mat-body'); mb.textContent = p.materialInfo; mb.classList.remove('open'); }
  else mW.style.display = 'none';

  // Size guide
  const gW = document.getElementById('d-guide-wrap');
  if (p.guiaTalles) { gW.style.display = ''; const gb = document.getElementById('d-guide-body'); gb.textContent = p.guiaTalles; gb.classList.remove('open'); }
  else gW.style.display = 'none';

  const addBtn = document.getElementById('d-add-btn');
  addBtn.textContent = p.stock === false ? 'Agotado' : '+ Agregar al carrito';
  addBtn.disabled = p.stock === false;
  addBtn.classList.remove('added');

  document.getElementById('detail-overlay').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeDetail() {
  document.getElementById('detail-overlay').classList.remove('active');
  document.body.style.overflow = '';
}

function carouselMove(dir) {
  const slides = document.querySelectorAll('.detail-slide');
  if (slides.length <= 1) return;
  carouselGo((_ci + dir + slides.length) % slides.length);
}

function carouselGo(idx) {
  const slides = document.querySelectorAll('.detail-slide');
  const dots   = document.querySelectorAll('.c-dot');
  slides[_ci]?.classList.remove('active'); dots[_ci]?.classList.remove('on');
  _ci = idx;
  slides[_ci]?.classList.add('active');   dots[_ci]?.classList.add('on');
}

function detailSelectColor(ci) {
  _sc = ci;
  document.querySelectorAll('.d-swatch').forEach((el,i) => el.classList.toggle('on', i===ci));
}

function detailSelectSize(ti, val) {
  _st = val;
  document.querySelectorAll('.d-size-btn').forEach((el,i) => el.classList.toggle('on', i===ti));
}

function detailAdd() {
  if (!_dp) return;
  const talles = _dp.talles || [], colors = _dp.colores || [];
  if (talles.length > 0 && _st === null) {
    const w = document.getElementById('d-sizes-wrap');
    w.style.animation='none'; w.offsetHeight; w.style.animation='shake 0.3s'; return;
  }
  if (colors.length > 0 && _sc === null) {
    const w = document.getElementById('d-colors-wrap');
    w.style.animation='none'; w.offsetHeight; w.style.animation='shake 0.3s'; return;
  }
  const item = { ..._dp, qty:1,
    selectedTalle: _st||null,
    selectedColor: _sc!==null ? (colors[_sc]?.nombre||null) : null };
  const cart = getCart();
  const ex = cart.find(x => x.id===item.id && x.selectedTalle===item.selectedTalle && x.selectedColor===item.selectedColor);
  if (ex) ex.qty+=1; else cart.push(item);
  saveCart(cart);
  const btn = document.getElementById('d-add-btn');
  btn.textContent = '✓ Agregado'; btn.classList.add('added');
  setTimeout(() => { btn.textContent='+ Agregar al carrito'; btn.classList.remove('added'); }, 1800);
}

document.getElementById('detail-overlay').addEventListener('click', e => {
  if (e.target===document.getElementById('detail-overlay')) closeDetail();
});
document.addEventListener('keydown', e => {
  if (!document.getElementById('detail-overlay').classList.contains('active')) return;
  if (e.key==='Escape') closeDetail();
  if (e.key==='ArrowLeft') carouselMove(-1);
  if (e.key==='ArrowRight') carouselMove(1);
});

/* ── INIT ── */
let productsLoaded = false;

async function boot() {
  await loadProducts();
  productsLoaded = true;
  // aplicar urlFilter después de cargar
  const urlFilter = new URLSearchParams(window.location.search).get('filter');
  if (urlFilter) {
    currentFilter = urlFilter;
    const btn = document.querySelector(`.filter-btn[data-filter="${urlFilter}"]`);
    if (btn) {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }
  }
  renderProducts();
}
boot();
</script>
<!-- ── PRODUCT DETAIL MODAL ── -->

      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>

    <!-- carousel -->
    <div id="detail-carousel">
      <div id="detail-slides"></div>

        <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <button class="c-nav-btn hidden" id="c-next" onclick="carouselMove(1)">
        <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
      <div class="c-dots" id="c-dots"></div>
    </div>

    <!-- info -->
    <div id="detail-info">
      <span class="d-cat" id="d-cat"></span>
      <h2 class="d-nombre" id="d-nombre"></h2>
      <span class="d-precio" id="d-precio"></span>

      <div id="d-colors-wrap" style="display:none">
        <div class="d-divider"></div>
        <p class="d-section-lbl" id="d-color-lbl">Color</p>
        <div class="d-color-row" id="d-colors"></div>
      </div>

      <div id="d-sizes-wrap" style="display:none">
        <div class="d-divider"></div>
        <p class="d-section-lbl">Talle</p>
        <div class="d-size-row" id="d-sizes"></div>
      </div>

      <div id="d-desc-wrap" style="display:none">
        <div class="d-divider"></div>
        <p class="d-desc-text" id="d-desc"></p>
      </div>

      <div id="d-mat-wrap" style="display:none">
        <div class="d-divider"></div>
        <button class="d-mat-toggle" onclick="document.getElementById('d-mat-body').classList.toggle('open')">
          Material &amp; Cuidado ↓
        </button>
        <p class="d-mat-body" id="d-mat-body"></p>
      </div>

      <div id="d-guide-wrap" style="display:none">
        <button class="d-guide-toggle" onclick="document.getElementById('d-guide-body').classList.toggle('open')">
          Guía de talles ↓
        </button>
        <div class="d-guide-body" id="d-guide-body"></div>
      </div>

      <div class="d-add-row">
        <button class="d-add-btn" id="d-add-btn" onclick="detailAdd()">+ Agregar al carrito</button>
      </div>
    </div>
  </div>
</div>
