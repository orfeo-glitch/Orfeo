<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop — Orfeo</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:     #f0ede6;
  --dark:   #0d0d0d;
  --white:  #ffffff;
  --border: rgba(13,13,13,0.1);
  --panel:  #e8e5de;
  --muted:  rgba(13,13,13,0.4);
  --nav-h:  52px;
  --font:   'DM Sans', sans-serif;
}
html,body{height:100%;}
body{background:var(--bg);color:var(--dark);font-family:var(--font);overflow-x:hidden;}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;height:var(--nav-h);display:flex;align-items:center;justify-content:space-between;padding:0 36px;background:var(--bg);border-bottom:.5px solid var(--border);}
.nav-left{display:flex;align-items:center;gap:20px;}
.nav-right{display:flex;align-items:center;gap:24px;}
.nav-logo{font-size:13px;font-weight:500;letter-spacing:.08em;color:var(--dark);text-decoration:none;}
.nav-link{font-size:11px;font-weight:400;letter-spacing:.08em;text-transform:uppercase;color:var(--dark);text-decoration:none;opacity:.55;transition:opacity .2s;}
.nav-link:hover,.nav-link.active{opacity:1;}
.nav-search{display:flex;align-items:center;gap:6px;border-bottom:.5px solid rgba(13,13,13,.2);padding-bottom:3px;}
.nav-search input{background:none;border:none;outline:none;font-family:var(--font);font-size:12px;font-weight:300;color:var(--dark);width:140px;}
.nav-search input::placeholder{color:rgba(13,13,13,.35);}
#nav-cart{font-size:11px;font-weight:400;letter-spacing:.06em;color:var(--dark);text-decoration:none;opacity:.7;transition:opacity .2s;}
#nav-cart:hover{opacity:1;}

/* FILTER BAR */
.filter-bar{position:sticky;top:var(--nav-h);z-index:50;background:var(--bg);border-bottom:.5px solid var(--border);padding:0 36px;display:flex;align-items:center;overflow-x:auto;}
.filter-bar::-webkit-scrollbar{display:none;}
.filter-btn{padding:14px 18px;border:none;background:none;font-family:var(--font);font-size:11px;font-weight:400;letter-spacing:.08em;text-transform:uppercase;color:rgba(13,13,13,.4);cursor:pointer;border-bottom:1.5px solid transparent;transition:color .15s,border-color .15s;white-space:nowrap;}
.filter-btn:hover{color:var(--dark);}
.filter-btn.active{color:var(--dark);border-bottom-color:var(--dark);}

/* BODY */
.shop-body{padding-top:calc(var(--nav-h) + 48px);min-height:100vh;}
.shop-header{padding:36px 36px 0;display:flex;align-items:baseline;justify-content:space-between;}
.shop-title{font-size:11px;font-weight:400;letter-spacing:.1em;text-transform:uppercase;opacity:.5;}
#products-count{font-size:11px;font-weight:300;opacity:.4;}
.shop-main{padding:28px 36px 80px;}

/* GRID */
.shop-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;}
@media(max-width:1100px){.shop-grid{grid-template-columns:repeat(3,1fr);}}
@media(max-width:760px){.shop-grid{grid-template-columns:repeat(2,1fr);gap:12px;}}

/* SKELETON */
@keyframes shimmer{0%{background-position:-600px 0}100%{background-position:600px 0}}
.sk-card{display:flex;flex-direction:column;gap:10px;}
.sk-img{aspect-ratio:3/4;background:linear-gradient(90deg,var(--panel) 25%,#dedad3 50%,var(--panel) 75%);background-size:600px 100%;animation:shimmer 1.3s ease-in-out infinite;border-radius:2px;}
.sk-line{height:11px;border-radius:2px;background:linear-gradient(90deg,var(--panel) 25%,#dedad3 50%,var(--panel) 75%);background-size:600px 100%;animation:shimmer 1.3s ease-in-out infinite;}
.sk-line.w60{width:60%;}.sk-line.w40{width:40%;}

/* ERROR */
.load-error{grid-column:1/-1;text-align:center;padding:80px 24px;display:flex;flex-direction:column;align-items:center;gap:16px;}
.load-error p{font-size:13px;font-weight:300;opacity:.55;}
.retry-btn{padding:10px 24px;border:.5px solid rgba(13,13,13,.3);background:transparent;font-family:var(--font);font-size:11px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;border-radius:999px;color:var(--dark);transition:background .15s,color .15s;}
.retry-btn:hover{background:var(--dark);color:var(--white);border-color:var(--dark);}

/* CARD */
.product-card{display:flex;flex-direction:column;gap:10px;cursor:pointer;}
.product-img{aspect-ratio:3/4;background:var(--panel);overflow:hidden;position:relative;border-radius:2px;}
.product-img img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .4s ease;}
.product-card:hover .product-img img{transform:scale(1.03);}
.product-badge{position:absolute;top:10px;left:10px;font-size:9px;font-weight:400;letter-spacing:.1em;text-transform:uppercase;padding:3px 8px;border-radius:999px;}
.product-badge.agotado{background:rgba(13,13,13,.08);color:var(--dark);}
.product-info{display:flex;flex-direction:column;gap:3px;}
.product-cat{font-size:9px;letter-spacing:.1em;text-transform:uppercase;opacity:.38;}
.product-name{font-size:13px;font-weight:300;line-height:1.3;}
.product-price{font-size:12px;font-weight:300;margin-top:2px;}
.product-add{margin-top:6px;align-self:flex-start;padding:7px 16px;border:.5px solid rgba(13,13,13,.25);background:transparent;font-family:var(--font);font-size:10px;letter-spacing:.07em;text-transform:uppercase;cursor:pointer;border-radius:999px;color:var(--dark);transition:background .15s,color .15s,border-color .15s;}
.product-add:hover,.product-add.added{background:var(--dark);color:var(--white);border-color:var(--dark);}

/* EMPTY */
.empty-state{grid-column:1/-1;text-align:center;padding:80px 24px;font-size:13px;font-weight:300;opacity:.4;}

/* FOOTER */
footer{background:var(--dark);color:rgba(240,237,230,.7);padding:60px 36px 36px;}
.footer-index{display:grid;grid-template-columns:repeat(4,1fr);gap:40px;margin-bottom:48px;}
.footer-col-title{font-size:10px;font-weight:400;letter-spacing:.1em;text-transform:uppercase;color:rgba(240,237,230,.4);margin-bottom:14px;}
.footer-col-links{display:flex;flex-direction:column;gap:8px;}
.footer-col-link{font-size:12px;font-weight:300;color:rgba(240,237,230,.65);text-decoration:none;transition:color .15s;}
.footer-col-link:hover{color:rgba(240,237,230,1);}
.footer-bottom{display:flex;justify-content:space-between;align-items:center;border-top:.5px solid rgba(240,237,230,.1);padding-top:24px;}
.footer-copy{font-size:11px;font-weight:300;}
.footer-logo{font-size:13px;font-weight:500;letter-spacing:.06em;color:rgba(240,237,230,.9);}
@media(max-width:760px){
  .footer-index{grid-template-columns:repeat(2,1fr);gap:28px;}
  nav{padding:0 20px;}
  .shop-main,.shop-header{padding-left:20px;padding-right:20px;}
  .filter-bar{padding:0 20px;}
}

/* ═══════════════════════════════════
   DETAIL MODAL
═══════════════════════════════════ */
#detail-overlay{position:fixed;inset:0;z-index:300;background:rgba(13,13,13,.5);display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(6px);}
#detail-overlay.open{display:flex;}
#detail-modal{background:var(--bg);width:100%;max-width:880px;max-height:92vh;display:grid;grid-template-columns:1fr 1fr;overflow:hidden;position:relative;animation:mIn .22s cubic-bezier(.34,1.46,.64,1);}
@keyframes mIn{from{opacity:0;transform:scale(.96) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}

#d-close{position:absolute;top:14px;right:14px;z-index:10;width:28px;height:28px;border-radius:50%;background:rgba(240,237,230,.88);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;}
#d-close:hover{background:var(--bg);}

/* carousel */
#d-carousel{position:relative;background:var(--panel);overflow:hidden;min-height:380px;}
.d-slide{position:absolute;inset:0;opacity:0;transition:opacity .28s ease;}
.d-slide.on{opacity:1;}
.d-slide img{width:100%;height:100%;object-fit:cover;display:block;}
.c-btn{position:absolute;top:50%;transform:translateY(-50%);width:30px;height:30px;border-radius:50%;background:rgba(240,237,230,.82);border:none;cursor:pointer;z-index:5;display:flex;align-items:center;justify-content:center;transition:background .15s;}
.c-btn:hover{background:var(--bg);}
.c-btn.hide{display:none;}
#c-prev{left:10px;}#c-next{right:10px;}
.c-dots{position:absolute;bottom:10px;left:0;right:0;display:flex;justify-content:center;gap:5px;z-index:5;}
.c-dot{width:5px;height:5px;border-radius:50%;background:rgba(13,13,13,.2);cursor:pointer;transition:background .15s;}
.c-dot.on{background:var(--dark);}

/* info */
#d-info{padding:32px 28px 24px;overflow-y:auto;display:flex;flex-direction:column;}
#d-info::-webkit-scrollbar{width:3px;}
#d-info::-webkit-scrollbar-thumb{background:rgba(13,13,13,.1);}
.di-cat{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:7px;}
.di-nombre{font-size:clamp(18px,2.2vw,22px);font-weight:300;letter-spacing:-.02em;line-height:1.15;margin-bottom:6px;}
.di-precio{font-size:15px;font-weight:300;margin-bottom:22px;}
.di-div{height:.5px;background:var(--border);margin:14px 0;}
.di-lbl{font-size:10px;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);margin-bottom:9px;display:block;}
.di-colors{display:flex;flex-wrap:wrap;gap:8px;}
.di-color{display:flex;flex-direction:column;align-items:center;gap:3px;}
.di-swatch{width:26px;height:26px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:border-color .15s,transform .12s;}
.di-swatch:hover{transform:scale(1.1);}
.di-swatch.on{border-color:var(--dark);}
.di-sw-name{font-size:9px;letter-spacing:.04em;color:var(--muted);max-width:36px;text-align:center;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.di-sizes{display:flex;flex-wrap:wrap;gap:5px;}
.di-sz{padding:6px 12px;border:.5px solid rgba(13,13,13,.18);background:transparent;font-family:var(--font);font-size:11px;color:var(--dark);cursor:pointer;border-radius:2px;transition:all .15s;}
.di-sz:hover{border-color:rgba(13,13,13,.35);}
.di-sz.on{background:var(--dark);color:var(--white);border-color:var(--dark);}
.di-desc{font-size:12px;font-weight:300;line-height:1.75;color:rgba(13,13,13,.65);}
.di-toggle{font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);background:none;border:none;font-family:var(--font);cursor:pointer;text-decoration:underline;padding:0;text-align:left;}
.di-collapsible{font-size:11px;font-weight:300;line-height:1.65;color:var(--muted);margin-top:8px;display:none;white-space:pre-wrap;}
.di-collapsible.open{display:block;}
.di-add-row{margin-top:auto;padding-top:20px;}
.di-add-btn{width:100%;padding:13px 24px;background:var(--dark);color:var(--white);border:none;font-family:var(--font);font-size:11px;font-weight:400;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;border-radius:999px;transition:background .2s;}
.di-add-btn:hover{background:rgba(13,13,13,.82);}
.di-add-btn:disabled{background:rgba(13,13,13,.18);cursor:not-allowed;}
.di-add-btn.done{background:rgba(13,13,13,.55);}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.shake{animation:shake .3s;}
@media(max-width:680px){
  #detail-modal{grid-template-columns:1fr;grid-template-rows:55vw 1fr;max-height:95vh;}
  #d-carousel{min-height:unset;}
  #d-info{padding:20px 18px 18px;}
}
</style>
</head>
<body>

<nav>
  <div class="nav-left">
    <a href="index.html" class="nav-logo">Orfeo</a>
    <a href="index.html" class="nav-link">Inicio</a>
    <a href="shop.html"  class="nav-link active">Shop</a>
  </div>
  <div class="nav-right">
    <div class="nav-search">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" opacity=".4"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="search-input" type="text" placeholder="Buscar..." oninput="filterProducts()">
    </div>
    <a href="cart.html" id="nav-cart">Carrito: 0</a>
  </div>
</nav>

<div class="filter-bar">
  <button class="filter-btn active" data-filter="all"       onclick="setFilter('all',this)">Todo</button>
  <button class="filter-btn"        data-filter="sweater"   onclick="setFilter('sweater',this)">Sweaters</button>
  <button class="filter-btn"        data-filter="accesorio" onclick="setFilter('accesorio',this)">Accesorios</button>
</div>

<div class="shop-body">
  <div class="shop-header">
    <span class="shop-title">Colección</span>
    <span id="products-count"></span>
  </div>
  <main class="shop-main">
    <div class="shop-grid" id="shop-grid"></div>
  </main>
</div>

<footer>
  <div class="footer-index">
    <div>
      <p class="footer-col-title">Shop</p>
      <div class="footer-col-links">
        <a href="shop.html" class="footer-col-link">Todo</a>
        <a href="shop.html?filter=sweater" class="footer-col-link">Sweaters</a>
        <a href="shop.html?filter=accesorio" class="footer-col-link">Accesorios</a>
      </div>
    </div>
    <div>
      <p class="footer-col-title">Info</p>
      <div class="footer-col-links">
        <a href="#" class="footer-col-link">Sobre Orfeo</a>
        <a href="#" class="footer-col-link">Envíos</a>
        <a href="#" class="footer-col-link">Cambios y devoluciones</a>
      </div>
    </div>
    <div>
      <p class="footer-col-title">Socials</p>
      <div class="footer-col-links">
        <a href="#" id="lnk-ig" class="footer-col-link">Instagram</a>
        <a href="#" id="lnk-tk" class="footer-col-link">TikTok</a>
      </div>
    </div>
    <div>
      <p class="footer-col-title">Contacto</p>
      <div class="footer-col-links">
        <a href="mailto:hola@orfeo.ar" id="lnk-email" class="footer-col-link">hola@orfeo.ar</a>
        <a href="#" id="lnk-wa" class="footer-col-link">WhatsApp</a>
      </div>
    </div>
  </div>
  <div class="footer-bottom">
    <span class="footer-copy">© 2026 Orfeo. Todos los derechos reservados.</span>
    <span class="footer-logo">Orfeo®</span>
  </div>
</footer>

<!-- DETAIL MODAL -->
<div id="detail-overlay">
  <div id="detail-modal">
    <button id="d-close" onclick="closeDetail()">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <div id="d-carousel">
      <div id="d-slides"></div>
      <button class="c-btn hide" id="c-prev" onclick="cMove(-1)"><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg></button>
      <button class="c-btn hide" id="c-next" onclick="cMove(1)"><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></button>
      <div class="c-dots" id="d-dots"></div>
    </div>
    <div id="d-info">
      <span class="di-cat"    id="d-cat"></span>
      <h2  class="di-nombre"  id="d-nombre"></h2>
      <span class="di-precio" id="d-precio"></span>

      <div id="d-cw" style="display:none">
        <div class="di-div"></div>
        <span class="di-lbl">Color</span>
        <div class="di-colors" id="d-colors"></div>
      </div>

      <div id="d-sw" style="display:none">
        <div class="di-div"></div>
        <span class="di-lbl">Talle</span>
        <div class="di-sizes" id="d-sizes"></div>
      </div>

      <div id="d-dw" style="display:none">
        <div class="di-div"></div>
        <p class="di-desc" id="d-desc"></p>
      </div>

      <div id="d-mw" style="display:none">
        <div class="di-div"></div>
        <button class="di-toggle" onclick="toggleC('d-mat')">Material &amp; Cuidado ↓</button>
        <p class="di-collapsible" id="d-mat"></p>
      </div>

      <div id="d-gw" style="display:none">
        <button class="di-toggle" onclick="toggleC('d-guide')" style="margin-top:10px">Guía de talles ↓</button>
        <div class="di-collapsible" id="d-guide"></div>
      </div>

      <div class="di-add-row">
        <button class="di-add-btn" id="d-add" onclick="detailAdd()">+ Agregar al carrito</button>
      </div>
    </div>
  </div>
</div>

<script>
/* ── HELPERS ── */
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

/* ── CART ── */
const CART_KEY='orfeo_cart';
function getCart(){try{return JSON.parse(localStorage.getItem(CART_KEY)||'[]');}catch{return[];}}
function saveCart(c){localStorage.setItem(CART_KEY,JSON.stringify(c));updateCartNav();}
function updateCartNav(){const t=getCart().reduce((s,i)=>s+i.qty,0);const el=document.getElementById('nav-cart');if(el)el.textContent='Carrito: '+t;}

/* ── DATA ── */
const DB_KEY='orfeo_db';
let allProducts=[],currentFilter='all',productsLoaded=false;

function showSkeleton(){
  document.getElementById('products-count').textContent='';
  document.getElementById('shop-grid').innerHTML=Array(8).fill(0).map(()=>`<div class="sk-card"><div class="sk-img"></div><div class="sk-line w60"></div><div class="sk-line w40"></div></div>`).join('');
}

async function loadProducts(){
  showSkeleton();
  let db=null,source='none';
  try{
    const res=await fetch('/api/entries');
    if(res.ok){
      const p=await res.json();
      if(p&&typeof p==='object'&&!Array.isArray(p)&&Array.isArray(p.products)){
        db=p;source='api';
        try{localStorage.setItem(DB_KEY,JSON.stringify(db));}catch(e){}
      }else{console.warn('[orfeo] formato inesperado de /api/entries:',typeof p);}
    }else{console.warn('[orfeo] /api/entries status:',res.status);}
  }catch(e){console.error('[orfeo] fetch error:',e.message);}

  if(!db){
    try{const raw=localStorage.getItem(DB_KEY);if(raw){const p=JSON.parse(raw);if(p&&Array.isArray(p.products)){db=p;source='cache';}}}catch(e){}
  }
  console.info('[orfeo] fuente:',source,'productos:',db?.products?.length??0);

  if(db?.settings){
    const s=db.settings;
    if(s.email&&s.email!=='#'){const el=document.getElementById('lnk-email');el.href='mailto:'+s.email;el.textContent=s.email;}
    if(s.instagram&&s.instagram!=='#')document.getElementById('lnk-ig').href=s.instagram;
    if(s.tiktok&&s.tiktok!=='#')document.getElementById('lnk-tk').href=s.tiktok;
    if(s.whatsapp&&s.whatsapp!=='#')document.getElementById('lnk-wa').href='https://wa.me/'+s.whatsapp.replace(/\D/g,'');
  }

  if(!db||!db.products||db.products.length===0){allProducts=[];renderError(source);return;}
  allProducts=db.products;
}

function renderError(src){
  document.getElementById('products-count').textContent='';
  const msg=src==='none'?'No se pudo conectar con el servidor.':'No hay productos disponibles.';
  document.getElementById('shop-grid').innerHTML=`<div class="load-error"><p>${msg}</p><button class="retry-btn" onclick="retry()">Reintentar</button></div>`;
}
async function retry(){productsLoaded=false;allProducts=[];await loadProducts();productsLoaded=true;if(allProducts.length>0)renderProducts();}

/* ── FILTER ── */
function setFilter(f,btn){currentFilter=f;document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');if(productsLoaded)renderProducts();}
function filterProducts(){if(productsLoaded)renderProducts();}
function getFiltered(){
  const q=(document.getElementById('search-input').value||'').toLowerCase().trim();
  return allProducts.filter(p=>{
    const cat=currentFilter==='all'||p.categoria===currentFilter;
    const s=!q||p.nombre.toLowerCase().includes(q)||(p.descripcion||'').toLowerCase().includes(q);
    return cat&&s;
  });
}

/* ── RENDER ── */
function renderProducts(){
  const filtered=getFiltered();
  const grid=document.getElementById('shop-grid');
  document.getElementById('products-count').textContent=filtered.length+(filtered.length===1?' producto':' productos');
  if(filtered.length===0){grid.innerHTML='<div class="empty-state">No se encontraron productos.</div>';return;}
  grid.innerHTML=filtered.map(p=>`
    <div class="product-card" onclick="openDetail(${p.id})">
      <div class="product-img">
        <img src="${esc(p.img)}" alt="${esc(p.nombre)}" loading="lazy" onerror="this.style.display='none'">
        ${p.stock===false?'<span class="product-badge agotado">Agotado</span>':''}
      </div>
      <div class="product-info">
        <span class="product-cat">${esc(p.categoria)}</span>
        <span class="product-name">${esc(p.nombre)}</span>
        <span class="product-price">$${Number(p.precio).toLocaleString('es-AR')}</span>
        ${p.stock!==false?`<button class="product-add" onclick="event.stopPropagation();quickAdd(this,${p.id})">+ Agregar</button>`:''}
      </div>
    </div>`).join('');
}

function quickAdd(btn,id){
  const p=allProducts.find(x=>x.id===id);if(!p)return;
  if((p.talles&&p.talles.length>0)||(p.colores&&p.colores.length>0)){openDetail(id);return;}
  const cart=getCart();
  const ex=cart.find(x=>x.id===id&&!x.selectedTalle&&!x.selectedColor);
  if(ex)ex.qty+=1;else cart.push({...p,qty:1,selectedTalle:null,selectedColor:null});
  saveCart(cart);
  btn.textContent='✓ Agregado';btn.classList.add('added');
  setTimeout(()=>{btn.textContent='+ Agregar';btn.classList.remove('added');},1800);
}

/* ── DETAIL MODAL ── */
let _dp=null,_ci=0,_sc=null,_st=null;

function openDetail(id){
  const p=allProducts.find(x=>x.id===id);if(!p)return;
  _dp=p;_ci=0;_sc=null;_st=null;
  const imgs=(p.imgs&&p.imgs.length>0)?p.imgs:(p.img?[p.img]:[]);

  document.getElementById('d-slides').innerHTML=imgs.map((src,i)=>`<div class="d-slide ${i===0?'on':''}"><img src="${esc(src)}" alt="${esc(p.nombre)}" onerror="this.style.display='none'"></div>`).join('');
  document.getElementById('d-dots').innerHTML=imgs.length>1?imgs.map((_,i)=>`<div class="c-dot ${i===0?'on':''}" onclick="cGo(${i})"></div>`).join(''):'';
  document.getElementById('c-prev').classList.toggle('hide',imgs.length<=1);
  document.getElementById('c-next').classList.toggle('hide',imgs.length<=1);

  document.getElementById('d-cat').textContent=p.categoria||'';
  document.getElementById('d-nombre').textContent=p.nombre||'';
  document.getElementById('d-precio').textContent='$'+Number(p.precio).toLocaleString('es-AR');

  const colors=p.colores||[];
  const cW=document.getElementById('d-cw');
  cW.style.display=colors.length>0?'':'none';
  if(colors.length>0){document.getElementById('d-colors').innerHTML=colors.map((c,i)=>`<div class="di-color"><div class="di-swatch" style="background:${esc(c.hex||'#ccc')}" onclick="selColor(${i})" title="${esc(c.nombre||'')}"></div><span class="di-sw-name">${esc(c.nombre||'')}</span></div>`).join('');}

  const sizes=p.talles||[];
  const sW=document.getElementById('d-sw');
  sW.style.display=sizes.length>0?'':'none';
  if(sizes.length>0){document.getElementById('d-sizes').innerHTML=sizes.map((t,i)=>`<button class="di-sz" onclick="selSize(${i})">${esc(t)}</button>`).join('');}

  const dW=document.getElementById('d-dw');
  if(p.descripcion){dW.style.display='';document.getElementById('d-desc').textContent=p.descripcion;}else dW.style.display='none';

  const mW=document.getElementById('d-mw');
  if(p.materialInfo){mW.style.display='';const el=document.getElementById('d-mat');el.textContent=p.materialInfo;el.classList.remove('open');}else mW.style.display='none';

  const gW=document.getElementById('d-gw');
  if(p.guiaTalles){gW.style.display='';const el=document.getElementById('d-guide');el.textContent=p.guiaTalles;el.classList.remove('open');}else gW.style.display='none';

  const btn=document.getElementById('d-add');
  btn.textContent=p.stock===false?'Agotado':'+ Agregar al carrito';
  btn.disabled=p.stock===false;btn.classList.remove('done');

  document.getElementById('detail-overlay').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeDetail(){document.getElementById('detail-overlay').classList.remove('open');document.body.style.overflow='';}
function toggleC(id){document.getElementById(id).classList.toggle('open');}
function cMove(dir){const s=document.querySelectorAll('.d-slide');if(s.length<=1)return;cGo((_ci+dir+s.length)%s.length);}
function cGo(idx){const s=document.querySelectorAll('.d-slide'),d=document.querySelectorAll('.c-dot');s[_ci]?.classList.remove('on');d[_ci]?.classList.remove('on');_ci=idx;s[_ci]?.classList.add('on');d[_ci]?.classList.add('on');}
function selColor(ci){_sc=ci;document.querySelectorAll('.di-swatch').forEach((el,i)=>el.classList.toggle('on',i===ci));}
function selSize(ti){_st=(_dp.talles||[])[ti]||null;document.querySelectorAll('.di-sz').forEach((el,i)=>el.classList.toggle('on',i===ti));}

function detailAdd(){
  if(!_dp)return;
  const talles=_dp.talles||[],colors=_dp.colores||[];
  if(talles.length>0&&_st===null){const w=document.getElementById('d-sw');w.classList.remove('shake');void w.offsetWidth;w.classList.add('shake');return;}
  if(colors.length>0&&_sc===null){const w=document.getElementById('d-cw');w.classList.remove('shake');void w.offsetWidth;w.classList.add('shake');return;}
  const item={..._dp,qty:1,selectedTalle:_st||null,selectedColor:_sc!==null?(colors[_sc]?.nombre||null):null};
  const cart=getCart();
  const ex=cart.find(x=>x.id===item.id&&x.selectedTalle===item.selectedTalle&&x.selectedColor===item.selectedColor);
  if(ex)ex.qty+=1;else cart.push(item);
  saveCart(cart);
  const btn=document.getElementById('d-add');
  btn.textContent='✓ Agregado';btn.classList.add('done');
  setTimeout(()=>{btn.textContent='+ Agregar al carrito';btn.classList.remove('done');},1800);
}

document.getElementById('detail-overlay').addEventListener('click',e=>{if(e.target===document.getElementById('detail-overlay'))closeDetail();});
document.addEventListener('keydown',e=>{
  if(!document.getElementById('detail-overlay').classList.contains('open'))return;
  if(e.key==='Escape')closeDetail();
  if(e.key==='ArrowLeft')cMove(-1);
  if(e.key==='ArrowRight')cMove(1);
});

/* ── BOOT ── */
updateCartNav();
async function boot(){
  await loadProducts();
  productsLoaded=true;
  if(allProducts.length===0)return;
  const urlF=new URLSearchParams(window.location.search).get('filter');
  if(urlF){currentFilter=urlF;const btn=document.querySelector(`.filter-btn[data-filter="${urlF}"]`);if(btn){document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}}
  renderProducts();
}
boot();
</script>
