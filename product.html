<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop</title>
<link rel="icon" type="image/png" href="favicon.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f0ede6;--dark:#0d0d0d;--white:#ffffff;
  --border:rgba(13,13,13,0.09);--panel:#e8e5de;--muted:rgba(13,13,13,0.38);
  --nav-h:52px;--font:'DM Sans',sans-serif;
}
html,body{min-height:100%;background:var(--bg);color:var(--dark);font-family:var(--font);}

/* ── NAV ── */
nav{position:sticky;top:0;z-index:100;height:var(--nav-h);display:flex;align-items:center;justify-content:space-between;padding:0 32px;background:var(--bg);border-bottom:.5px solid var(--border);}
.nav-left{display:flex;align-items:center;gap:18px;}
.nav-logo{font-size:13px;font-weight:500;letter-spacing:.06em;color:var(--dark);text-decoration:none;}
.nav-link{font-size:11px;font-weight:400;letter-spacing:.08em;text-transform:uppercase;color:var(--dark);text-decoration:none;opacity:.45;transition:opacity .2s;}
.nav-link:hover{opacity:1;}
.nav-right{display:flex;align-items:center;gap:20px;}
#nav-cart{font-size:11px;font-weight:400;letter-spacing:.06em;color:var(--dark);text-decoration:none;opacity:.7;transition:opacity .2s;}
#nav-cart:hover{opacity:1;}

/* ── BREADCRUMB ── */
.breadcrumb{padding:12px 32px;display:flex;align-items:center;gap:8px;border-bottom:.5px solid var(--border);}
.bc-link{font-size:11px;font-weight:300;color:var(--muted);text-decoration:none;transition:color .15s;}
.bc-link:hover{color:var(--dark);}
.bc-sep{font-size:11px;color:rgba(13,13,13,.18);}
.bc-current{font-size:11px;font-weight:300;color:var(--dark);}

/* ── PRODUCT LAYOUT: thumbnails | imagen | info ── */
.product-layout{
  display:grid;
  grid-template-columns:72px 1fr 400px;
  min-height:calc(100vh - var(--nav-h) - 44px);
}

/* ── THUMBNAILS ── */
.thumbs-col{
  padding:20px 10px;
  display:flex;flex-direction:column;gap:8px;
  border-right:.5px solid var(--border);
  overflow-y:auto;
  align-items:center;
}
.thumb{
  width:52px;height:52px;background:var(--panel);
  border:.5px solid transparent;cursor:pointer;overflow:hidden;
  flex-shrink:0;transition:border-color .15s;
}
.thumb.on{border-color:var(--dark);}
.thumb img{width:100%;height:100%;object-fit:cover;display:block;}

/* ── IMAGEN PRINCIPAL ── */
.main-img-col{
  position:sticky;top:var(--nav-h);
  height:calc(100vh - var(--nav-h));
  background:var(--panel);
  overflow:hidden;display:flex;align-items:center;justify-content:center;
}
.main-slide{position:absolute;inset:0;opacity:0;transition:opacity .25s ease;}
.main-slide.on{opacity:1;}
.main-slide img,.main-slide video{
  width:100%;height:100%;object-fit:cover;display:block;
}
/* flechas */
.img-arrow{
  position:absolute;top:50%;transform:translateY(-50%);
  width:34px;height:34px;border-radius:50%;
  background:rgba(240,237,230,.85);border:none;cursor:pointer;z-index:5;
  display:flex;align-items:center;justify-content:center;transition:background .15s;
}
.img-arrow:hover{background:var(--bg);}
.img-arrow.hide{display:none;}
#arr-prev{left:14px;}#arr-next{right:14px;}

/* ── INFO ── */
.info-col{
  padding:32px 32px 48px;
  border-left:.5px solid var(--border);
  display:flex;flex-direction:column;
  overflow-y:auto;
}

.pi-cat{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
.pi-nombre{font-size:clamp(20px,1.8vw,26px);font-weight:300;letter-spacing:-.02em;line-height:1.2;margin-bottom:6px;}
.pi-badge-new{display:inline-block;font-size:9px;font-weight:400;letter-spacing:.1em;text-transform:uppercase;padding:2px 8px;border-radius:999px;border:.5px solid rgba(13,13,13,.25);color:var(--dark);margin-left:8px;vertical-align:middle;}
.pi-precio{font-size:22px;font-weight:300;letter-spacing:-.02em;margin-bottom:24px;}

.pi-div{height:.5px;background:var(--border);margin:20px 0;}
.pi-label{font-size:10px;font-weight:400;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;display:block;}

/* COLORES — thumbnails de imagen */
.color-options{display:flex;flex-wrap:wrap;gap:8px;}
.color-opt{
  width:48px;height:48px;border:.5px solid rgba(13,13,13,.14);
  cursor:pointer;overflow:hidden;background:var(--panel);transition:border-color .15s;
}
.color-opt.on{border-color:var(--dark);border-width:1.5px;}
.color-opt-swatch{width:100%;height:100%;display:flex;align-items:center;justify-content:center;}
.color-opt img{width:100%;height:100%;object-fit:cover;display:block;}

/* TALLES */
.sizes-wrap{display:flex;flex-wrap:wrap;gap:6px;}
.sz-btn{
  padding:8px 14px;border:.5px solid rgba(13,13,13,.18);background:transparent;
  font-family:var(--font);font-size:12px;color:var(--dark);cursor:pointer;
  border-radius:3px;transition:all .15s;letter-spacing:.02em;min-width:44px;text-align:center;
}
.sz-btn:hover{border-color:rgba(13,13,13,.45);}
.sz-btn.on{background:var(--dark);color:var(--white);border-color:var(--dark);}

/* guía de talles */
.sg-toggle{font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);background:none;border:none;font-family:var(--font);cursor:pointer;text-decoration:underline;padding:0;margin-top:8px;}
.sg-table-wrap{display:none;margin-top:12px;overflow-x:auto;}
.sg-table-wrap.open{display:block;}
.sg-table{width:100%;border-collapse:collapse;font-size:12px;}
.sg-table th{text-align:left;font-size:9px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding:6px 10px;border-bottom:.5px solid var(--border);}
.sg-table td{padding:7px 10px;border-bottom:.5px solid var(--border);font-weight:300;}
.sg-table tr:last-child td{border-bottom:none;}

/* DESCRIPCIÓN */
.pi-desc{font-size:13px;font-weight:300;line-height:1.8;color:rgba(13,13,13,.65);}

/* ACORDEONES */
.accordion{margin-top:4px;}
.acc-item{border-bottom:.5px solid var(--border);}
.acc-btn{
  width:100%;display:flex;align-items:center;justify-content:space-between;
  padding:13px 0;background:none;border:none;font-family:var(--font);
  font-size:11px;font-weight:400;letter-spacing:.06em;text-transform:uppercase;
  color:var(--dark);cursor:pointer;opacity:.55;transition:opacity .15s;
}
.acc-btn:hover{opacity:1;}
.acc-btn svg{transition:transform .2s;flex-shrink:0;}
.acc-btn.open svg{transform:rotate(180deg);}
.acc-body{display:none;padding-bottom:14px;font-size:12px;font-weight:300;line-height:1.75;color:rgba(13,13,13,.6);}
.acc-body.open{display:block;}

/* CTA */
.cta-wrap{margin-top:auto;padding-top:24px;display:flex;flex-direction:column;gap:10px;}
.btn-add{
  width:100%;padding:15px 24px;background:var(--dark);color:var(--white);
  border:none;font-family:var(--font);font-size:11px;font-weight:400;
  letter-spacing:.1em;text-transform:uppercase;cursor:pointer;border-radius:999px;
  transition:background .2s;
}
.btn-add:hover{background:rgba(13,13,13,.82);}
.btn-add:disabled{background:rgba(13,13,13,.18);cursor:not-allowed;}
.btn-add.done{background:rgba(13,13,13,.5);}
.btn-back{font-size:11px;font-weight:300;color:var(--muted);letter-spacing:.04em;text-decoration:none;text-align:center;transition:color .15s;}
.btn-back:hover{color:var(--dark);}

/* SHAKE */
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.shake{animation:shake .3s;}

/* ── RELACIONADOS ── */
.related{padding:52px 32px;border-top:.5px solid var(--border);}
.rel-title{font-size:10px;font-weight:400;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:24px;}
.rel-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;}
.rel-card{cursor:pointer;}
.rel-img{aspect-ratio:3/4;background:var(--panel);overflow:hidden;margin-bottom:10px;}
.rel-img img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .4s;}
.rel-card:hover .rel-img img{transform:scale(1.03);}
.rel-name{font-size:12px;font-weight:300;}
.rel-price{font-size:12px;font-weight:300;color:var(--muted);margin-top:2px;}

/* ── FOOTER ── */
footer{background:var(--dark);padding:52px 32px 32px;}
.footer-index{display:grid;grid-template-columns:repeat(4,1fr);gap:36px;margin-bottom:0;}
.footer-col-title{font-size:10px;font-weight:400;letter-spacing:.1em;text-transform:uppercase;color:rgba(240,237,230,.3);margin-bottom:12px;}
.footer-col-links{display:flex;flex-direction:column;gap:8px;}
.footer-col-link{font-size:12px;font-weight:300;color:rgba(240,237,230,.55);text-decoration:none;transition:color .15s;}
.footer-col-link:hover{color:rgba(240,237,230,1);}
.footer-bottom{display:flex;justify-content:space-between;align-items:center;border-top:.5px solid rgba(255,255,255,.07);padding-top:20px;margin-top:48px;}
.footer-copy{font-size:11px;font-weight:300;color:rgba(240,237,230,.2);}
.footer-logo{font-size:12px;font-weight:400;letter-spacing:.08em;color:rgba(240,237,230,.2);}

/* FADE IN */
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.info-col{animation:fadeUp .4s ease both .1s;}

/* ZOOM en imagen */
.main-img-col{overflow:hidden;cursor:zoom-in;}
.main-img-col.zoomed{cursor:zoom-out;}
.main-slide img{transform-origin:var(--mx,50%) var(--my,50%);transition:transform .3s ease,opacity .25s ease;}
.main-img-col.zoomed .main-slide.on img{transform:scale(2);}

/* ── LOADING ── */
.page-msg{display:flex;align-items:center;justify-content:center;min-height:60vh;font-size:12px;font-weight:300;color:var(--muted);letter-spacing:.06em;}
@media(max-width:900px){
  .product-layout{grid-template-columns:1fr;grid-template-rows:auto;}
  .thumbs-col{flex-direction:row;border-right:none;border-bottom:.5px solid var(--border);padding:12px 16px;overflow-x:auto;}
  .thumbs-col::-webkit-scrollbar{display:none;}
  .main-img-col{position:relative;height:70vw;top:0;}
  .info-col{border-left:none;border-top:.5px solid var(--border);padding:24px 20px 40px;}
  .rel-grid{grid-template-columns:repeat(2,1fr);}
  nav{padding:0 20px;}
  .breadcrumb{padding:12px 20px;}
  .related{padding:40px 20px;}
  footer{padding:40px 20px 24px;}
  .footer-index{grid-template-columns:repeat(2,1fr);}
}
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-left">
    <a href="index.html" class="nav-logo">Orfeo</a>

    <a href="shop.html"  class="nav-link">Shop</a>

</nav>

<!-- BREADCRUMB -->
<div class="breadcrumb">

<!-- CONTENIDO -->
<div id="page-content">

</div>

<!-- RELACIONADOS -->
<div class="related" id="related" style="display:none">
  <p class="rel-title">También te puede gustar</p>
  <div class="rel-grid" id="rel-grid"></div>
</div>

<!-- FOOTER -->
<footer>
  <div class="footer-index">
    <div>
      <p class="footer-col-title">Shop</p>
      <div class="footer-col-links">
        <a href="shop.html" class="footer-col-link">Todo</a>
        <a href="shop.html?filter=sweater" class="footer-col-link">Sweaters</a>
        <a href="shop.html?filter=accesorio" class="footer-col-link">Accesorios</a>
      </div>
    </div>
    <div>
      <p class="footer-col-title">Info</p>
      <div class="footer-col-links">
        <a href="#" class="footer-col-link">Sobre Orfeo</a>

<script>
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

/* ── CART ── */
const CART_KEY='orfeo_cart';
function getCart(){try{return JSON.parse(localStorage.getItem(CART_KEY)||'[]');}catch{return[];}}
function saveCart(c){localStorage.setItem(CART_KEY,JSON.stringify(c));updateCartNav();}
function updateCartNav(){const t=getCart().reduce((s,i)=>s+i.qty,0);document.getElementById('nav-cart').textContent='Carrito: '+t;}
updateCartNav();

/* ── GALLERY STATE ── */
let _gi=0,_imgs=[];

function buildGallery(imgs){
  _imgs=imgs;_gi=0;

  // thumbs
  const thumbsEl=document.getElementById('thumbs');
  thumbsEl.innerHTML=imgs.map((src,i)=>`
    <div class="thumb ${i===0?'on':''}" onclick="gGo(${i})">
      <img src="${esc(src)}" alt="" onerror="this.parentElement.style.display='none'">
    </div>`).join('');

  // slides
  const slidesEl=document.getElementById('main-slides');
  slidesEl.innerHTML=imgs.map((src,i)=>`
    <div class="main-slide ${i===0?'on':''}" id="ms-${i}">
      ${src.match(/\.(mp4|webm|mov)$/i)
        ?`<video src="${esc(src)}" autoplay muted loop playsinline></video>`
        :`<img src="${esc(src)}" alt="" onerror="this.style.opacity='.15'">`}
    </div>`).join('');

  // flechas
  document.getElementById('arr-prev').classList.toggle('hide',imgs.length<=1);
  document.getElementById('arr-next').classList.toggle('hide',imgs.length<=1);
}

function gGo(idx){
  document.querySelectorAll('.main-slide').forEach((el,i)=>el.classList.toggle('on',i===idx));
  document.querySelectorAll('.thumb').forEach((el,i)=>el.classList.toggle('on',i===idx));
  _gi=idx;
}
function gMove(dir){gGo((_gi+dir+_imgs.length)%_imgs.length);}

/* ── SELECCIÓN ── */
let _product=null,_selTalle=null,_selColor=null;

function selTalle(btn,val){
  _selTalle=val;
  document.querySelectorAll('.sz-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
}
function selColor(btn,idx){
  _selColor=idx;
  document.querySelectorAll('.color-opt').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
}
function toggleAcc(btn,bodyId){
  btn.classList.toggle('open');
  document.getElementById(bodyId).classList.toggle('open');
}
function toggleSizeGuide(){
  document.getElementById('sg-wrap').classList.toggle('open');
}

/* ── AGREGAR AL CARRITO ── */
function addToCart(){
  if(!_product)return;
  const talles=_product.talles||[];
  const colores=_product.colores||[];

  if(talles.length>0&&!_selTalle){
    const el=document.querySelector('.sizes-wrap');
    if(el){el.classList.remove('shake');void el.offsetWidth;el.classList.add('shake');}
    return;
  }
  if(colores.length>0&&_selColor===null){
    const el=document.querySelector('.color-options');
    if(el){el.classList.remove('shake');void el.offsetWidth;el.classList.add('shake');}
    return;
  }

  const colorNombre=_selColor!==null?(colores[_selColor]?.nombre||String(_selColor)):null;
  const cart=getCart();
  const key=`${_product.id}|${_selTalle||''}|${colorNombre||''}`;
  const ex=cart.find(x=>`${x.id}|${x.selectedTalle||''}|${x.selectedColor||''}`===key);
  if(ex)ex.qty+=1;
  else cart.push({..._product,qty:1,selectedTalle:_selTalle||null,selectedColor:colorNombre});
  saveCart(cart);

  const btn=document.getElementById('btn-add');
  btn.textContent='✓ Agregado';btn.classList.add('done');
  setTimeout(()=>{btn.textContent='+ Agregar al carrito';btn.classList.remove('done');},2000);
}

/* ── RENDER ── */
function renderProduct(p){
  _product=p;_selTalle=null;_selColor=null;
  document.title=p.nombre+' — Orfeo';
  document.getElementById('bc-name').textContent=p.nombre;

  const imgs=(p.imgs&&p.imgs.length>0)?p.imgs:(p.img?[p.img]:[]);

  const isNew=p.fecha&&(Date.now()-new Date(p.fecha).getTime())<7*24*60*60*1000;
  const colores=p.colores||[];
  const talles=p.talles||[];
  const sizes=p.sizes||[];
  const agotado=p.stock===false;

  // ─ INFO HTML ─
  let info=`
    <span class="pi-cat">${esc(p.categoria||'')}</span>
    <h1 class="pi-nombre">${esc(p.nombre)}${isNew?`<span class="pi-badge-new">Nuevo</span>`:''}</h1>
    <span class="pi-precio">$${Number(p.precio).toLocaleString('es-AR')}</span>`;

  // colores
  if(colores.length>0){
    info+=`<div class="pi-div"></div>
    <span class="pi-label">Color${_selColor!==null?` — ${esc(colores[_selColor]?.nombre||'')}`:''}</span>
    <div class="color-options">
      ${colores.map((c,i)=>{
        const hex=c.hex||c||'#ccc';
        const nombre=c.nombre||'';
        return `<button class="color-opt" onclick="selColor(this,${i})" title="${esc(nombre)}">
          <div class="color-opt-swatch" style="background:${esc(hex)};width:100%;height:100%;"></div>
        </button>`;
      }).join('')}
    </div>`;
  }

  // talles
  if(talles.length>0){
    info+=`<div class="pi-div"></div>
    <span class="pi-label">Talle</span>
    <div class="sizes-wrap">
      ${talles.map(t=>`<button class="sz-btn" onclick="selTalle(this,'${esc(t)}')">${esc(t)}</button>`).join('')}
    </div>`;

    // tabla de talles
    if(sizes.length>0&&sizes[0]&&sizes[0].length>1){
      info+=`<button class="sg-toggle" onclick="toggleSizeGuide()">Guía de talles ↓</button>
      <div class="sg-table-wrap" id="sg-wrap">
        <table class="sg-table">
          <thead><tr><th>Talle</th><th>Pecho (cm)</th><th>Largo (cm)</th><th>Manga (cm)</th></tr></thead>
          <tbody>${sizes.map(r=>`<tr>${r.map(c=>`<td>${esc(c)}</td>`).join('')}</tr>`).join('')}</tbody>
        </table>
      </div>`;
    }
  }

  // descripción
  if(p.descripcion){
    info+=`<div class="pi-div"></div><p class="pi-desc">${esc(p.descripcion)}</p>`;
  }

  // acordeones
  let accs='';
  if(p.materialInfo)accs+=`
    <div class="acc-item">
      <button class="acc-btn" onclick="toggleAcc(this,'acc-mat')">
        Material &amp; Cuidado
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
      <div class="acc-body" id="acc-mat">${esc(p.materialInfo)}</div>
    </div>`;
  if(p.envioInfo)accs+=`
    <div class="acc-item">
      <button class="acc-btn" onclick="toggleAcc(this,'acc-env')">
        Envíos y devoluciones
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
      <div class="acc-body" id="acc-env">${esc(p.envioInfo)}</div>
    </div>`;
  if(accs)info+=`<div class="pi-div"></div><div class="accordion">${accs}</div>`;

  // CTA
  info+=`<div class="cta-wrap">
    <button class="btn-add" id="btn-add" onclick="addToCart()" ${agotado?'disabled':''}>
      ${agotado?'Agotado':'+ Agregar al carrito'}
    </button>
    <a href="shop.html" class="btn-back">← Seguir comprando</a>
  </div>`;

  // inyectar
  document.getElementById('page-content').innerHTML=`
    <div class="product-layout">
      <div class="thumbs-col" id="thumbs"></div>
      <div class="main-img-col" id="main-img-col">
        <div id="main-slides"></div>
        <button class="img-arrow hide" id="arr-prev" onclick="gMove(-1)">
          <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <button class="img-arrow hide" id="arr-next" onclick="gMove(1)">
          <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>
      <div class="info-col">${info}</div>
    </div>`;

  buildGallery(imgs.length?imgs:['']);
}

/* ── RELACIONADOS ── */
function renderRelated(all,current){
  const list=all.filter(p=>p.id!==current.id&&p.categoria===current.categoria).slice(0,4);
  if(!list.length)return;
  document.getElementById('related').style.display='block';
  document.getElementById('rel-grid').innerHTML=list.map(p=>`
    <div class="rel-card" onclick="window.location='product.html?id=${p.id}'">
      <div class="rel-img"><img src="${esc(p.img)}" alt="${esc(p.nombre)}" loading="lazy" onerror="this.style.display='none'"></div>
      <p class="rel-name">${esc(p.nombre)}</p>
      <p class="rel-price">$${Number(p.precio).toLocaleString('es-AR')}</p>
    </div>`).join('');
}

/* ── ZOOM ── */
(function(){
  const col=document.querySelector('.main-img-col')||document;
  document.addEventListener('click',e=>{
    const c=e.target.closest('.main-img-col');
    if(!c)return;
    c.classList.toggle('zoomed');
  });
  document.addEventListener('mousemove',e=>{
    const c=e.target.closest('.main-img-col');
    if(!c||!c.classList.contains('zoomed'))return;
    const r=c.getBoundingClientRect();
    const x=((e.clientX-r.left)/r.width*100).toFixed(1)+'%';
    const y=((e.clientY-r.top)/r.height*100).toFixed(1)+'%';
    c.style.setProperty('--mx',x);c.style.setProperty('--my',y);
    c.querySelectorAll('.main-slide img').forEach(img=>{img.style.transformOrigin=`${x} ${y}`;});
  });
})();

/* ── BOOT ── */
(async()=>{
  const id=parseInt(new URLSearchParams(window.location.search).get('id'));
  if(!id){document.getElementById('page-content').innerHTML='<div class="page-msg">Producto no encontrado.</div>';return;}

  let db=null;
  try{const r=await fetch('/api/entries');if(r.ok){const p=await r.json();if(p&&p.products)db=p;}}catch{}
  if(!db){try{const raw=localStorage.getItem('orfeo_db');if(raw)db=JSON.parse(raw);}catch{}}

  if(!db?.products){document.getElementById('page-content').innerHTML='<div class="page-msg">Error al cargar.</div>';return;}

  if(db.settings){
    const s=db.settings;
    if(s.instagram&&s.instagram!=='#')document.getElementById('lnk-ig').href=s.instagram;
    if(s.tiktok&&s.tiktok!=='#')document.getElementById('lnk-tk').href=s.tiktok;
    if(s.email&&s.email!=='#'){const el=document.getElementById('lnk-email');el.href='mailto:'+s.email;el.textContent=s.email;}
    if(s.whatsapp&&s.whatsapp!=='#')document.getElementById('lnk-wa').href='https://wa.me/'+s.whatsapp.replace(/\D/g,'');
  }

  const product=db.products.find(p=>p.id===id);
  if(!product){document.getElementById('page-content').innerHTML='<div class="page-msg">Producto no encontrado.</div>';return;}

  renderProduct(product);
  renderRelated(db.products,product);
})();
</script>
